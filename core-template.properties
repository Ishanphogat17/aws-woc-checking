# PostgreSQL connection
spring.datasource.url=jdbc:postgresql://<YOUR_PROD_DB_HOST>:<PORT>/<YOUR_PROD_DB_NAME>?sslmode=require&currentSchema=aws_woc_prod
spring.datasource.username=<YOUR_PROD_DB_USERNAME>
spring.datasource.password=<YOUR_PROD_DB_PASSWORD>

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Optional logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

jwt.secret=<YOUR_PROD_JWT_SECRET_KEY>
jwt.expiration=900000

swagger.server.url=https://amazon-woc-api.wallofcommitment.com

aws.s3.bucket-name=woc-prod-storage
aws.s3.accessKey=<YOUR_PROD_AWS_ACCESS_KEY>
aws.s3.secretKey=<YOUR_PROD_AWS_SECRET_KEY>
aws.s3.region=ap-south-1
aws.s3.folder-name=aws-woc-prod