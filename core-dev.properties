# AWS WOC Configuration Repository

This repository hosts the centralized application properties files for the **AWS WOC** (Wall of Commitment) backend services. These configurations are managed and served dynamically using a **Spring Cloud Config Server**.

## Repository Structure

The configuration files are named according to the Spring Boot client application name and active profiles:

* **`core-local.properties`**: Configuration profiles used for running the Core backend service on a local development environment.
* **`core-dev.properties`**: Configuration profiles used for the shared Development server.
* **`core-prod.properties`**: Configuration profiles used for the Production environment.
* **`core-template.properties`**: A template file containing all configuration properties with descriptions and placeholder indicators. Use this to prepare configurations for new environments.

---

## Configuration Properties Overview

Each properties file contains the following key configuration blocks:

1. **PostgreSQL Database Connection**: Connection URL, username, and password credentials for the relational database.
2. **JPA & Hibernate Settings**: DDL auto-generation strategy and SQL log formatting.
3. **JWT Security Configuration**: Base64 encoded private signing key and token expiration periods.
4. **AWS S3 Settings**: AWS access/secret keys, region, bucket, and folder configurations for image compression and storage.
5. **Swagger Base URL**: Endpoint server URLs exposed in the API documentation console.

---

## How to Set Up Your Configuration

1. **Copy the Template**: Copy the contents of `core-template.properties` or duplicate one of the environment files (e.g., `core-dev.properties`).
2. **Fill in Your Secrets**: Remove the placeholders (e.g., `<YOUR_PROD_DB_PASSWORD>`) and substitute your actual infrastructure secrets (PostgreSQL database credentials, JWT secret key, and AWS keys).
3. **Commit the Changes**: Commit the files to your private remote Git repository (e.g., Bitbucket, GitHub, or GitLab).
4. **Point Config Server to this Repository**:
   In your **Config Server** (`aws-woc-backend/config-server`), edit the configuration git URI to point to this repository. Refer to the config server setup documentation for details.
