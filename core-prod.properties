# PostgreSQL connection
spring.datasource.url=jdbc:postgresql://<YOUR_LOCAL_DB_HOST>:<PORT>/<YOUR_LOCAL_DB_NAME>?sslmode=require
spring.datasource.username=<YOUR_LOCAL_DB_USERNAME>
spring.datasource.password=<YOUR_LOCAL_DB_PASSWORD>

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Optional logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

jwt.secret=<YOUR_LOCAL_JWT_SECRET_KEY>
jwt.expiration=900000


swagger.server.url=http://localhost:9504